<!DOCTYPE html>
<html lang="es" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring Boot WebSocket Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <style>
        :root {
            --bg-color: #1e1e2e;
            --panel-bg: #282a36;
            --text-color: #f8f8f2;
            --primary-color: #bd93f9;
            --secondary-color: #6272a4;
            --success-color: #50fa7b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            background-color: var(--panel-bg);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 80vh;
        }

        /* Pantalla de Inicio de Sesión */
        #login-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 20px;
        }

        #login-page h2 {
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        input {
            width: 80%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            margin-bottom: 15px;
            background-color: #44475a;
            color: white;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border: 2px solid var(--primary-color);
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            background-color: var(--primary-color);
            color: #282a36;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #ff79c6;
        }

        /* Pantalla de Chat */
        #chat-page {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            background-color: var(--primary-color);
            color: #282a36;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            padding: 10px 15px;
            border-radius: 8px;
            max-width: 75%;
            word-wrap: break-word;
        }

        .message.join, .message.leave {
            align-self: center;
            background-color: var(--secondary-color);
            font-size: 12px;
            padding: 5px 10px;
            border-radius: 12px;
        }

        .message.chat {
            background-color: #44475a;
            align-self: flex-start;
        }

        .message.chat.my-message {
            background-color: var(--primary-color);
            color: #282a36;
            align-self: flex-end;
        }

        .message .sender {
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 4px;
            display: block;
        }

        .chat-input-container {
            display: flex;
            padding: 15px;
            background-color: #1e1e2e;
        }

        .chat-input-container input {
            flex: 1;
            margin-bottom: 0;
            margin-right: 10px;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div id="login-page">
        <h2>Bienvenido al Servidor</h2>
        <label for="name"></label><input type="text" id="name" placeholder="Nombre de usuario" autocomplete="off">
        <button onclick="connect()">Entrar al Chat</button>
    </div>

    <div id="chat-page">
        <div class="chat-header">
            Sala General 🟢
        </div>
        <div class="chat-messages" id="message-container">
        </div>
        <div class="chat-input-container">
            <label for="message"></label><input type="text" id="message" placeholder="Escribe un mensaje" autocomplete="off" onkeypress="handleEnter(event)">
            <button onclick="sendMessage()">Enviar</button>
        </div>
    </div>
</div>

<script src="/js/main.js"></script>
</body>
